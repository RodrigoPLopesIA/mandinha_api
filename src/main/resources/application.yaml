spring:
  application:
    name: mandinha-api

  datasource:
    url: jdbc:postgresql://localhost:5432/mandinha_db
    username: mandinha_user
    password: mandinha_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/mandinha-realm

server:
  port: 8080